# Local TLS lab: Nginx (profile nginx) and/or Apache (profile apache) with
# the same self-signed key material from ./certs/ (see scripts/gen-tls-certs.sh).
#
#   docker compose --profile nginx up -d    # https://127.0.0.1:8443
#   docker compose --profile apache up -d   # https://127.0.0.1:8444
#
# Generate certs first: ./scripts/gen-tls-certs.sh  (1-day default)

services:
  tls-nginx:
    image: nginx:1.27-alpine
    container_name: ac-synth-tls-nginx
    ports:
      - "8443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    profiles: ["nginx"]

  tls-apache:
    build:
      context: .
      dockerfile: apache/Dockerfile
    image: ac-synth-tls-apache:local
    container_name: ac-synth-tls-apache
    ports:
      - "8444:443"
    volumes:
      - ./certs:/certs:ro
    profiles: ["apache"]
