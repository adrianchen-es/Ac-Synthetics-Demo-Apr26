# HTTPS on container port 443. Host maps 8443 (Nginx) or 8444 (Apache) in docker-compose.
server {
    listen 443 ssl;
    server_name localhost tls-lab.test;
    ssl_certificate     /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;
    location / {
        return 200 'local TLS lab (nginx)\n';
        add_header Content-Type text/plain;
    }
}
