name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  validate:
    name: Type-check, dry-run, journey names & unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ── Install ─────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: npm ci

      # ── TypeScript ──────────────────────────────────────────────────────────
      - name: TypeScript type-check
        run: npx tsc --noEmit

      # ── Journeys (no network needed): dry-run, ASCII monitor names, unit tests ─
      - name: CI checks (dry-run + journey names + unit tests)
        run: npm run test:ci
